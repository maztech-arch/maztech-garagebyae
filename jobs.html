<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>งานซ่อมทั้งหมด — MazTech Garage</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div class="app-shell">
  <aside id="sidebar"></aside>

  <div class="main-area">
    <header id="topbar"></header>

    <main class="page-content">

      <!-- Page Header -->
      <div class="page-header">
        <div class="page-header-left">
          <h2>งานซ่อมทั้งหมด</h2>
          <p id="jobs-count">กำลังโหลด...</p>
        </div>
        <a href="new-job.html" class="btn btn-primary">+ เปิดงานใหม่</a>
      </div>

      <!-- Toolbar -->
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">ทั้งหมด</button>
          <button class="filter-tab" data-filter="inprogress" onclick="setFilter('inprogress', this)">กำลังดำเนินการ</button>
          <button class="filter-tab" data-filter="ready" onclick="setFilter('ready', this)">พร้อมส่งมอบ</button>
          <button class="filter-tab" data-filter="delivered" onclick="setFilter('delivered', this)">ส่งมอบแล้ว</button>
        </div>
        <div class="search-bar" style="flex:1">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" class="form-control search-input"
            placeholder="ค้นหา เลขที่งาน / ทะเบียน / ลูกค้า..." oninput="onSearch()" />
        </div>
      </div>

      <!-- Jobs Table -->
      <div class="card" style="padding:0">
        <div id="jobs-table-wrap">
          <div class="loading-state"><div class="spinner"></div><p>กำลังโหลดข้อมูล...</p></div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="assets/app.js"></script>
<script src="assets/mock-data.js"></script>
<script>
  renderTopbar('งานซ่อมทั้งหมด');

  let _currentFilter = 'all';
  let _searchTimer   = null;

  function setFilter(filter, btn) {
    _currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadJobs();
  }

  function onSearch() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(loadJobs, 350);
  }

  async function loadJobs() {
    const search = document.getElementById('search-input').value.trim();
    document.getElementById('jobs-table-wrap').innerHTML =
      `<div class="loading-state"><div class="spinner"></div><p>กำลังโหลด...</p></div>`;

    try {
      const data = await getJobs({ filter: _currentFilter, search });
      const jobs = data.jobs || [];

      document.getElementById('jobs-count').textContent =
        `พบ ${fmt.number(jobs.length)} รายการ`;

      if (!jobs.length) {
        document.getElementById('jobs-table-wrap').innerHTML =
          `<div class="empty-state"><p>ไม่พบข้อมูลงาน</p></div>`;
        return;
      }

      document.getElementById('jobs-table-wrap').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>เลขที่งาน</th>
                <th>วันที่</th>
                <th>ทะเบียนรถ</th>
                <th>รุ่นรถ</th>
                <th>ชื่อลูกค้า</th>
                <th>เบอร์โทร</th>
                <th>สถานะ</th>
                <th class="td-right">ค่าแรง</th>
                <th class="td-right">ค่าอะไหล่</th>
                <th class="td-right">ยอดรวม</th>
              </tr>
            </thead>
            <tbody>
              ${jobs.map(j => `
                <tr onclick="location.href='job-detail.html?re=${encodeURIComponent(j.re_no)}'">
                  <td class="td-mono">${j.re_no || '-'}</td>
                  <td class="td-muted" style="white-space:nowrap">${fmt.date(j.job_date)}</td>
                  <td><strong>${j.license || '-'}</strong></td>
                  <td>${j.car_model || '-'}</td>
                  <td>${j.cust_name || '-'}</td>
                  <td class="td-muted">${j.phone || '-'}</td>
                  <td>${renderBadge(j.status)}</td>
                  <td class="td-right td-muted">${fmt.baht(j.total_labor)}</td>
                  <td class="td-right td-muted">${fmt.baht(j.total_parts)}</td>
                  <td class="td-right td-bold">${fmt.baht(j.total_sell)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch (err) {
      document.getElementById('jobs-table-wrap').innerHTML = `
        <div class="error-state">
          <span class="error-icon">⚠</span>
          <p>${err.message}</p>
          <button onclick="loadJobs()" class="btn btn-outline btn-sm">ลองใหม่</button>
        </div>
      `;
    }
  }

  loadJobs();
</script>
</body>
</html>
